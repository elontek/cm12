name: Build TWRP Xperia Z2

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04
timeout-minutes: 360

steps:
  - name: Disk temizle
    run: |
      sudo rm -rf /usr/share/dotnet
      sudo rm -rf /opt/ghc
      df -h

  - name: Paketleri kur
    run: |
      sudo apt update
      sudo apt install -y \
        git curl python3 unzip zip \
        openjdk-8-jdk

  - name: Repo kur
    run: |
      mkdir -p ~/bin
      curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
      chmod +x ~/bin/repo
      echo "$HOME/bin" >> $GITHUB_PATH

  - name: TWRP source çek
    run: |
      mkdir twrp
      cd twrp
      repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0
      repo sync -j4

  - name: Xperia Z2 device tree
    run: |
      mkdir -p twrp/device/sony
      cd twrp/device/sony
      git clone -b sirius https://github.com/ShadowElite117/android_sony_shinano_twrp.git sirius

  - name: Build
    run: |
      cd twrp
      source build/envsetup.sh
      lunch omni_sirius-eng
      make recoveryimage -j4

  - name: Upload
    uses: actions/upload-artifact@v4
    with:
      name: recovery
      path: twrp/out/target/product/sirius/recovery.img
