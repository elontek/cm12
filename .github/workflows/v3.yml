name: Build Galaxy S2 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git bc bison flex make gcc g++ \
            libssl-dev libelf-dev libncurses5-dev \
            build-essential lzop cpio unzip zip wget curl

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/J0SH1X/android_kernel_samsung_smdk4412/tree/lineage-23.0-bpf.git kernel

      - name: Download ARM GCC 4.9
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 toolchain

      - name: Patch Defconfig
        run: |
          cd kernel
          sed -i '/INITRAMFS_SOURCE/d' arch/arm/configs/lineageos_i9100_defconfig || true
          
      - name: Build Kernel
        run: |
          export ARCH=arm
          export SUBARCH=arm
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/arm-linux-androideabi-

          cd kernel

          make mrproper
          make lineageos_i9100_defconfig

          sed -i '/CONFIG_INITRAMFS_SOURCE/d' .config
          echo 'CONFIG_INITRAMFS_SOURCE=""' >> .config

          yes "" | make oldconfig

          make -j$(nproc)

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyS2-Kernel
          path: |
            kernel/arch/arm/boot/zImage
            kernel/arch/arm/boot/zImage/zImage-dtb
            kernel/.config
