name: Build Samsung Exynos5420 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git bc bison flex make gcc g++ \
            libssl-dev libelf-dev libncurses5-dev \
            build-essential lzop cpio unzip zip wget curl

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b lineage-21.0 \
            https://github.com/salih4187/android_kernel_samsung_exynos5420.git kernel

      - name: Download ARM GCC 4.9
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 \
            toolchain

      - name: Prepare Config
        run: |
          cd kernel

          # Doğru defconfig adını kontrol et.
          ls arch/arm/configs | grep lineage || true

          make mrproper

          # Gerekirse bu satırı repo içindeki gerçek defconfig ile değiştir.
          make lineageos_exynos5420_defconfig || make exynos5420_defconfig

          sed -i '/CONFIG_INITRAMFS_SOURCE/d' .config
          echo 'CONFIG_INITRAMFS_SOURCE=""' >> .config

          yes "" | make oldconfig

      - name: Build Kernel
        run: |
          export ARCH=arm
          export SUBARCH=arm
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/arm-linux-androideabi-

          cd kernel

          make -j$(nproc) KCFLAGS=-Wno-error

      - name: Upload Kernel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Exynos5420-Kernel
          path: |
            kernel/arch/arm/boot/zImage
            kernel/arch/arm/boot/zImage-dtb
            kernel/.config
