name: Build Samsung Note4 Exynos Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache cpio curl flex g++ gcc git \
            libelf-dev libncurses5-dev libssl-dev lzop python-is-python3 \
            rsync unzip wget zip

      - name: Clone kernel
        run: |
          git clone --depth=1 \
            -b lineage-20.0 \
            https://github.com/TouseefX/android_kernel_samsung_universal5433.git \
            kernel

      - name: Clone GCC 4.9
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 \
            toolchain

      - name: Show available defconfigs
        run: |
          ls kernel/arch/arm/configs | grep lineage || true

      - name: Configure kernel
        run: |
          export ARCH=arm
          export SUBARCH=arm
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/arm-linux-androideabi-

          mkdir -p out

          cd kernel

          make O=../out mrproper

          make O=../out lineage_trelteskt_defconfig

          make O=../out olddefconfig || yes "" | make O=../out oldconfig

      - name: Build kernel
        run: |
          export ARCH=arm
          export SUBARCH=arm
          export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/arm-linux-androideabi-

          cd kernel

          make O=../out \
               KCFLAGS="-Wno-error" \
               -j$(nproc)

      - name: List outputs
        if: always()
        run: |
          find out -type f | grep -E "zImage|Image|dtb|dt.img|Image.gz" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel
          path: |
            out/.config
            out/arch/arm/boot/zImage
            out/arch/arm/boot/Image
            out/arch/arm/boot/Image.gz
            out/arch/arm/boot/*.dtb
            out/arch/arm/boot/dts/**/*.dtb
